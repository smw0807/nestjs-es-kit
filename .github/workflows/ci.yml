name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  unit:
    name: Unit tests (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22.13, 24]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.1.3
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter . lint
      - run: pnpm --filter . typecheck
      - run: pnpm --filter . test
      - run: pnpm --filter . build

  integration:
    name: Integration tests (ES ${{ matrix.es-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        es-version: ['8.18.2', '9.0.0']
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.1.3
      - uses: actions/setup-node@v4
        with:
          node-version: 22.13
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Run integration tests (ES ${{ matrix.es-version }})
        run: pnpm --filter . test:integration
        env:
          ES_VERSION: ${{ matrix.es-version }}
